<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AXITECH | Gestion des Ressources Humaines</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            background:linear-gradient(135deg,#0F172A,#1E3A8A,#2563EB);
            min-height:100vh;
        }

        .card{

            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 25px 60px rgba(0,0,0,.25);

        }

        .card-header{

            background:linear-gradient(90deg,#0d6efd,#2563eb);
            padding:35px;
            border:none;

        }

        .logo{

            width:85px;
            height:85px;
            border-radius:50%;
            background:white;
            color:#0d6efd;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            margin:auto;
            margin-bottom:20px;

        }

        .form-control{

            height:55px;
            border-radius:12px;

        }

        textarea.form-control{

            height:120px;

        }

        .input-group-text{

            background:#f8f9fa;
            border-radius:12px 0 0 12px;

        }

        .btn-primary{

            height:55px;
            border-radius:12px;
            font-weight:600;
            letter-spacing:.5px;
            transition:.3s;

        }

        .btn-primary:hover{

            transform:translateY(-2px);

        }

        .section-title{

            font-size:18px;
            font-weight:600;
            color:#0d6efd;
            margin-bottom:20px;

        }

        .footer{

            text-align:center;
            color:white;
            margin-top:25px;
            font-size:14px;

        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card">

                <div class="card-header text-center text-white">

                    <div class="logo">

                        <i class="bi bi-person-plus-fill"></i>

                    </div>

                    <h2 class="fw-bold mb-2">

                        AXITECH

                    </h2>

                    <p class="mb-0">

                        Gestion des Ressources Humaines

                    </p>

                </div>

                <div class="card-body p-5">

                    <div class="section-title">

                        <i class="bi bi-person-vcard-fill me-2"></i>

                        Informations personnelles

                    </div>

                    <form action="/gestionressourceshumaines/personne" method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-4">

                                <label class="form-label fw-semibold">

                                    Nom

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-person"></i>

                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        name="nom"
                                        placeholder="Entrez votre nom"
                                        required>

                                </div>

                            </div>

                            <div class="col-md-6 mb-4">

                                <label class="form-label fw-semibold">

                                    Prénom

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-person-fill"></i>

                                    </span>

                                    <input
                                        type="text"
                                        class="form-control"
                                        name="prenom"
                                        placeholder="Entrez votre prénom"
                                        required>

                                </div>

                            </div>

                            <div class="col-12 mb-4">

                                <label class="form-label fw-semibold">

                                    Adresse

                                </label>

                                <div class="input-group">

                                    <span class="input-group-text">

                                        <i class="bi bi-geo-alt-fill"></i>

                                    </span>

                                    <textarea
                                        class="form-control"
                                        name="adresse"
                                        placeholder="Saisissez votre adresse complète"
                                        required></textarea>

                                </div>

                            </div>

                        </div>

                        <div class="alert alert-info border-0">

                            <i class="bi bi-info-circle-fill"></i>

                            Vérifiez soigneusement les informations avant de procéder à l'enregistrement.

                        </div>

                        <div class="d-grid mt-4">

                            <button class="btn btn-primary">

                                <i class="bi bi-floppy-fill me-2"></i>

                                Enregistrer la personne

                            </button>

                        </div>

                    </form>

                </div>

            </div>

            <div class="footer">

                © 2026 AXITECH • Gestion des Ressources Humaines

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
