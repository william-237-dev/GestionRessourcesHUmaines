<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Personnes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- Titre -->
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">
            <i class="bi bi-people-fill"></i> Gestion des Personnes
        </h1>
        <p class="text-muted">
            Ajoutez et consultez les informations des personnes enregistrées.
        </p>
    </div>

    <!-- Formulaire -->
    <div class="card shadow-lg border-0 mb-5">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">
                <i class="bi bi-person-plus-fill"></i>
                Ajouter une personne
            </h4>
        </div>

        <div class="card-body">
            <form action="personne" method="post">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Nom
                        </label>
                        <input
                            type="text"
                            name="nom"
                            class="form-control"
                            placeholder="Entrez le nom"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Prénom
                        </label>
                        <input
                            type="text"
                            name="prenom"
                            class="form-control"
                            placeholder="Entrez le prénom"
                            required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            Adresse
                        </label>
                        <input
                            type="text"
                            name="adresse"
                            class="form-control"
                            placeholder="Entrez votre adresse"
                            required>
                    </div>

                </div>

                <div class="mt-4 text-end">
                    <button type="reset" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-counterclockwise"></i>
                        Réinitialiser
                    </button>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        Enregistrer
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Tableau -->
    <div class="card shadow-lg border-0">

        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">
                <i class="bi bi-card-list"></i>
                Liste des personnes
            </h4>
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Adresse</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Dupont</td>
                            <td>Jean</td>
                            <td>jean.axitech@gmail.com</td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
